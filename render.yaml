services:
  - type: web
    name: economic-events-backend
    runtime: python
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: ALFAFOREX_PAGE_URL
        value: https://alfaforex.ru/economic-calendar/
      - key: ALFAFOREX_SYNC_TTL_SECONDS
        value: "300"
      - key: FRONTEND_ORIGINS
        value: ""
      - key: FRONTEND_ORIGIN_REGEX
        value: "^https://.*\\.vercel\\.app$"
